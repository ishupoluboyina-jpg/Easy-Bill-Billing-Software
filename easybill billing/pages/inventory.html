<!DOCTYPE html>
<html>
<head>
    <title>Inventory Management</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="main">

    <h1>Inventory Management</h1>

    <div class="cards">

        <div class="card">
            <h3>Total Products</h3>
            <p>250</p>
        </div>

        <div class="card">
            <h3>Low Stock Alerts</h3>
            <p>15 Items</p>
        </div>

        <div class="card">
            <h3>Out of Stock</h3>
            <p>5 Items</p>
        </div>

    </div>

    <br>

    <table border="1" width="100%" cellpadding="10">
        <tr>
            <th>Product</th>
            <th>Stock</th>
            <th>Status</th>
        </tr>

        <tr>
            <td>Laptop</td>
            <td>20</td>
            <td>Available</td>
        </tr>

        <tr>
            <td>Printer</td>
            <td>3</td>
            <td>Low Stock</td>
        </tr>

        <tr>
            <td>Scanner</td>
            <td>0</td>
            <td>Out of Stock</td>
        </tr>

    </table>

</div>

</body>
</html>
