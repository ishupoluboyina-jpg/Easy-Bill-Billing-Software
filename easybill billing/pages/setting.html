<!DOCTYPE html>
<html>
<head>
    <title>Settings</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="main">

    <h1>Settings</h1>

    <div class="cards">

        <div class="card">
            <h3>Company Profile</h3>
            <p>Manage company information.</p>
        </div>

        <div class="card">
            <h3>GST Settings</h3>
            <p>Configure GST percentage and tax rules.</p>
        </div>

        <div class="card">
            <h3>Invoice Templates</h3>
            <p>Customize invoice formats.</p>
        </div>

    </div>

    <br>

    <div class="card">

        <h2>Company Information</h2>

        <br>

        <label>Company Name</label><br>
        <input type="text" value="Easy Bill Pvt Ltd" style="width:100%;padding:10px;">

        <br><br>

        <label>Email</label><br>
        <input type="email" value="info@easybill.com" style="width:100%;padding:10px;">

        <br><br>

        <label>Phone Number</label><br>
        <input type="text" value="+91 9876543210" style="width:100%;padding:10px;">

        <br><br>

        <label>GST Number</label><br>
        <input type="text" value="22AAAAA0000A1Z5" style="width:100%;padding:10px;">

        <br><br>

        <button style="padding:10px 20px;background:#0d6efd;color:white;border:none;border-radius:5px;">
            Save Settings
        </button>

    </div>

    <br>

    <div class="card">

        <h2>Notification Preferences</h2>

        <br>

        <input type="checkbox" checked> Email Notifications
        <br><br>

        <input type="checkbox" checked> SMS Notifications
        <br><br>

        <input type="checkbox"> WhatsApp Notifications

    </div>

</div>

</body>
</html>
