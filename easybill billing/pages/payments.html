<!DOCTYPE html>
<html>
<head>
    <title>Payment Management</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="main">

    <h1>Payment Records</h1>

    <div class="cards">

        <div class="card">
            <h3>Total Payments</h3>
            <p>₹2,50,000</p>
        </div>

        <div class="card">
            <h3>Pending Dues</h3>
            <p>₹35,000</p>
        </div>

        <div class="card">
            <h3>Receipts Generated</h3>
            <p>180</p>
        </div>

    </div>

    <br>

    <table border="1" width="100%" cellpadding="10">

        <tr>
            <th>Customer</th>
            <th>Amount</th>
            <th>Status</th>
        </tr>

        <tr>
            <td>Raj</td>
            <td>₹4,500</td>
            <td>Paid</td>
        </tr>

        <tr>
            <td>Anita</td>
            <td>₹3,200</td>
            <td>Pending</td>
        </tr>

    </table>

</div>

</body>
</html>
