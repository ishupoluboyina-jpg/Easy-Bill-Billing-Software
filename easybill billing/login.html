<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
}

.form-box{
width:400px;
margin:100px auto;
padding:25px;
background:white;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.2);
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
width:100%;
padding:12px;
background:#0d6efd;
color:white;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<div class="form-box">

<h2>Login</h2>

<input type="email"
id="email"
placeholder="Email">

<input type="password"
id="password"
placeholder="Password">

<button onclick="login()">
Login
</button>

<br><br>

<a href="register.html">
Create Account
</a>

</div>

<script>

function login(){

let email=
document.getElementById("email").value;

let password=
document.getElementById("password").value;

if(
email===localStorage.getItem("email")
&&
password===localStorage.getItem("password")
){

alert("Login Successful");

window.location="dashboard.html";

}
else{

alert("Invalid Email or Password");

}
}

</script>

</body>
</html>
